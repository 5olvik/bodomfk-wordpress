name: Kontroller og publiser tema

on:
  push:
    branches: [main]
    paths:
      - "themes/bodomfk-modern-theme/**"
      - ".github/workflows/release-theme.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Bygg tema-ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Hent kildekoden
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Les og kontroller versjonen
        shell: bash
        run: |
          version="$(sed -n 's/^Version:[[:space:]]*//p' themes/bodomfk-modern-theme/style.css | head -n 1)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Ugyldig eller manglende versjon i style.css: $version" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Kontroller PHP-syntaks
        shell: bash
        run: find themes/bodomfk-modern-theme -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Kontroller JavaScript-syntaks
        shell: bash
        run: node --check themes/bodomfk-modern-theme/assets/js/site.js

      - name: Pakk temaet
        shell: bash
        run: |
          mkdir -p dist
          cd themes
          zip -r "../dist/bodomfk-modern-theme-${VERSION}.zip" bodomfk-modern-theme -x "*.DS_Store"
          cd ../dist
          sha256sum "bodomfk-modern-theme-${VERSION}.zip" > "bodomfk-modern-theme-${VERSION}.zip.sha256"

      - name: Publiser GitHub-utgivelse
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${VERSION}"
          archive="dist/bodomfk-modern-theme-${VERSION}.zip"
          checksum="${archive}.sha256"

          if gh release view "$tag" >/dev/null 2>&1; then
            tagged_commit="$(git rev-list -n 1 "$tag")"
            if [[ "$tagged_commit" != "$GITHUB_SHA" ]]; then
              echo "Utgivelsen $tag finnes allerede. Øk Version i style.css før en ny temaendring." >&2
              exit 1
            fi
            gh release upload "$tag" "$archive" "$checksum" --clobber
          else
            gh release create "$tag" "$archive" "$checksum" \
              --target "$GITHUB_SHA" \
              --title "BMFK-tema ${VERSION}" \
              --generate-notes
          fi
